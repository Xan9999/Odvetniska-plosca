<!DOCTYPE html>
<html lang="sl" class="jp-theme">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadek &amp; Pensa — Prejeta pošta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/theme.css" />
</head>
<body class="h-full flex flex-col">

  <header class="h-14 bg-white flex items-center border-b border-slate-200 sticky top-0 z-20">
    <div class="w-full px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div>
          <img src="/static/media/jadek_pensa_logo.webp" alt="Jadek &amp; Pensa" class="h-8 w-auto" />
          <p class="text-slate-500 text-sm leading-tight">Sistem za sprejem strank</p>
        </div>
      </div>
      <nav class="hidden md:flex gap-4 text-sm font-medium">
        <a href="#" class="text-slate-900 border-b border-indigo-600 pb-2">Prejeta pošta</a>
        <a href="#" class="text-slate-500 hover:text-slate-900 pb-2 transition-all">Arhiv</a>
        <a href="#" class="text-slate-500 hover:text-slate-900 pb-2 transition-all">Nastavitve</a>
      </nav>
      <div class="flex items-center gap-3">
        <button onclick="deleteAll()"
          class="vs-btn-outline">
          Zbriši vse
        </button>
        <button onclick="openModal()"
          class="vs-btn flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          + Nova analiza
        </button>
      </div>
    </div>
  </header>

  <!-- Filter Bar -->
  <div class="bg-white px-6 py-3 flex flex-wrap gap-3 items-center border-b border-slate-200">
    <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-3 py-2 rounded-lg w-full max-w-md">
      <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="filter-search" type="text" placeholder="Išči po stranki, zadevi..." class="bg-transparent border-none outline-none text-sm w-full text-slate-800 placeholder:text-slate-400">
    </div>

    <div class="flex gap-2 flex-wrap items-center">
      <img src="/static/media/filter.png" alt="Filtri" class="h-5 w-5 opacity-70" />
      <select id="filter-conflict" class="bg-white text-sm px-2.5 py-2 border border-slate-200 rounded-lg outline-none focus:border-indigo-500">
        <option value="all">Konflikt (vsi)</option>
        <option value="ok">Ni konflikta</option>
        <option value="tveganje">Preverite</option>
        <option value="konflikt">KONFLIKT</option>
      </select>
      <select id="filter-profit" class="bg-white text-sm px-2.5 py-2 border border-slate-200 rounded-lg outline-none focus:border-indigo-500">
        <option value="all">Vrednost (vse)</option>
        <option value="gt10000">&gt; 10.000 €</option>
        <option value="1k-10k">1.000 - 10.000 €</option>
        <option value="lt1000">&lt; 1.000 €</option>
      </select>
      <select id="sort-by" class="bg-white text-sm px-2.5 py-2 border border-slate-200 rounded-lg outline-none focus:border-indigo-500">
        <option value="profit_desc">Razvrsti: Profit ↓</option>
        <option value="profit_asc">Razvrsti: Profit ↑</option>
      </select>
    </div>
  </div>

  <main class="flex-1 overflow-auto custom-scroll">
    <div class="px-6 py-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-slate-900 font-semibold text-base tracking-wide uppercase">Poizvedbe strank
          <span id="count-badge" class="ml-2 badge border border-slate-200 text-slate-500"></span>
        </h2>
        <p id="sort-hint" class="text-slate-500 text-sm">Razvrščeno po profitu</p>
      </div>

    <div id="loading-state" class="hidden text-center py-16 text-slate-400">
      <svg class="w-8 h-8 mx-auto mb-3 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
      </svg>
      Nalagam...
    </div>

    <div id="empty-state" class="hidden text-center py-20">
      <div class="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <p class="text-slate-500 font-medium">Ni prejetih poizvedb</p>
      <p class="text-slate-400 text-sm mt-1">Dodajte prvi mail s klikom na "Nov mail"</p>
    </div>

    <div class="overflow-x-auto border border-slate-200 rounded-xl bg-white">
      <table class="data-table">
        <thead>
          <tr>
            <th class="pl-6">Stranka / Pošiljatelj</th>
            <th>Zadeva</th>
            <th>Področje</th>
            <th>Vrednost</th>
            <th>Konflikt</th>
            <th>Rok</th>
          </tr>
        </thead>
        <tbody id="cards-grid"></tbody>
      </table>
    </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl">
      <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100">
        <h3 class="font-semibold text-slate-800">Nov dohodni mail</h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="email-form" onsubmit="submitEmail(event)" class="px-6 py-5 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Ime pošiljatelja</label>
            <input id="f-name" type="text" required placeholder="Ime Priimek"
              class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">E-mail pošiljatelja</label>
            <input id="f-email" type="email" required placeholder="ime@podjetje.si"
              class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Zadeva</label>
          <input id="f-subject" type="text" required placeholder="Zadeva e-pošte"
            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Besedilo e-pošte</label>
          <textarea id="f-body" rows="7" required placeholder="Prilepite vsebino dobljenega maila..."
            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1">Priloge <span class="text-slate-400 font-normal">(neobvezno — PDF, TXT)</span></label>
          <label id="drop-zone"
            class="flex flex-col items-center justify-center gap-1.5 w-full border-2 border-dashed border-slate-200 rounded-lg px-4 py-4 cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/40 transition-colors">
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
            </svg>
            <span id="drop-label" class="text-xs text-slate-400">Klikni ali povleci datoteke sem</span>
            <input id="f-attachments" type="file" multiple accept=".pdf,.txt" class="hidden"
              onchange="updateDropLabel(this)"/>
          </label>
        </div>
        <div class="flex items-center justify-between pt-2">
          <button type="button" onclick="closeModal()" class="text-slate-500 hover:text-slate-700 text-sm font-medium">Prekliči</button>
          <button id="submit-btn" type="submit"
            class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2.5 rounded-lg disabled:opacity-60 disabled:cursor-not-allowed">
            <span id="submit-label">Analiziraj z AI</span>
            <svg id="submit-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const CONFLICT_LABELS = { ok: 'Ni konflikta', tveganje: 'Preverite', konflikt: 'KONFLIKT' };
    const CONFLICT_COLORS = {
      ok:       'bg-green-50 text-green-700 border-green-200',
      tveganje: 'bg-amber-50  text-amber-700  border-amber-200',
      konflikt: 'bg-red-50    text-red-700    border-red-200',
    };
    const CONFLICT_DOT = { ok: 'bg-green-500', tveganje: 'bg-amber-500', konflikt: 'bg-red-500' };

    let ALL_EMAILS = [];
    let _filterTimer = null;

    function esc(v) {
      return String(v ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/\"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function profitNum(e) {
      const n = Number(e?.profit ?? 0);
      return Number.isFinite(n) ? n : 0;
    }

    function createdMs(e) {
      const t = Date.parse(e?.created_at ?? '');
      return Number.isFinite(t) ? t : 0;
    }

    function urgencyKey(e) {
      const days = e?.rok?.cas_dni;
      if (e?.rok?.nujno && days != null && Number.isFinite(Number(days))) {
        return { group: 0, value: Number(days) }; // smaller days = more urgent
      }
      const n = Number(e?.nujnost ?? 0);
      return { group: 1, value: - (Number.isFinite(n) ? n : 0) }; // higher nujnost = more urgent
    }

    function urgencyCell(e) {
      if (e?.rok?.nujno && e?.rok?.cas_dni != null) {
        const d = Number(e.rok.cas_dni);
        const cls = d <= 1 ? 'urgency-high font-bold' : d <= 3 ? 'urgency-medium font-semibold' : 'urgency-low font-semibold';
        const label = d === 1 ? 'Manj kot 1 dan' : `${d} dni`;
        return `<span class="${cls} font-bold">● ${esc(label)}</span>`;
      }
      if ((Number(e?.nujnost ?? 0) || 0) >= 0.8) {
        return `<span class="urgency-high font-bold">● NUJNO</span>`;
      }
      return `<span class="text-slate-400">—</span>`;
    }

    function rowMatchesFilters(e) {
      const q = (document.getElementById('filter-search')?.value ?? '').trim().toLowerCase();
      const fCon = document.getElementById('filter-conflict')?.value ?? 'all';
      const fPro = document.getElementById('filter-profit')?.value ?? 'all';

      if (q) {
        const hay = [
          e?.sender?.name, e?.sender?.email, e?.sender?.subject,
          e?.legal_field, e?.povzetek,
        ].map(x => String(x ?? '').toLowerCase()).join(' ');
        if (!hay.includes(q)) return false;
      }

      if (fCon !== 'all' && String(e?.conflict_status ?? '') !== fCon) return false;

      const p = profitNum(e);
      if (fPro === 'gt10000' && !(p > 10000)) return false;
      if (fPro === '1k-10k' && !(p >= 1000 && p <= 10000)) return false;
      if (fPro === 'lt1000' && !(p < 1000)) return false;

      return true;
    }

    function sortEmails(emails) {
      let mode = document.getElementById('sort-by')?.value ?? 'profit_desc';
      if (mode === 'urgency_profit') mode = 'profit_desc';
      const hint = document.getElementById('sort-hint');
      if (hint) {
        hint.textContent =
          mode === 'profit_desc' ? 'Razvrščeno po profitu ↓' :
          mode === 'profit_asc'  ? 'Razvrščeno po profitu ↑' :
          'Razvrščeno po profitu';
      }

      const copy = emails.slice();
      if (mode === 'profit_desc') {
        copy.sort((a,b) => (profitNum(b) - profitNum(a)) || (createdMs(b) - createdMs(a)));
        return copy;
      }
      if (mode === 'profit_asc') {
        copy.sort((a,b) => (profitNum(a) - profitNum(b)) || (createdMs(b) - createdMs(a)));
        return copy;
      }

      copy.sort((a,b) => {
        const ak = urgencyKey(a), bk = urgencyKey(b);
        if (ak.group !== bk.group) return ak.group - bk.group;
        if (ak.value !== bk.value) return ak.value - bk.value;
        const dp = profitNum(b) - profitNum(a);
        if (dp) return dp;
        return createdMs(b) - createdMs(a);
      });
      return copy;
    }

    function renderRow(e) {
      const cConf = CONFLICT_COLORS[e.conflict_status] || CONFLICT_COLORS.ok;
      const cDot  = CONFLICT_DOT[e.conflict_status]   || CONFLICT_DOT.ok;

      return `
        <tr class="cursor-pointer" onclick="window.location.href='/detail?id=${encodeURIComponent(e.id)}'">
          <td class="pl-6">
            <div class="font-semibold text-slate-900">${esc(e.sender?.name || 'Neznano')}</div>
            <div class="text-xs text-slate-500">${esc(e.sender?.email || '')}</div>
          </td>
          <td>
            <div class="max-w-[520px] truncate text-slate-800">${esc(e.sender?.subject || '')}</div>
            <div class="max-w-[520px] truncate text-sm text-slate-500">${esc(e.povzetek || '')}</div>
          </td>
          <td><span class="text-indigo-700 font-mono text-sm">${esc(e.legal_field || '')}</span></td>
          <td><span class="text-slate-900 font-mono font-bold text-sm">${profitNum(e).toLocaleString('sl-SI')} €</span></td>
          <td>
            <span class="text-xs border px-2 py-0.5 rounded-md ${cConf}">
              <span class="status-dot ${cDot} mr-1"></span>${esc(CONFLICT_LABELS[e.conflict_status] || CONFLICT_LABELS.ok)}
            </span>
          </td>
          <td>${urgencyCell(e)}</td>
        </tr>`;
    }

    function applyAndRender() {
      const grid  = document.getElementById('cards-grid');
      const empty = document.getElementById('empty-state');

      const filtered = ALL_EMAILS.filter(rowMatchesFilters);
      const sorted = sortEmails(filtered);

      const badge = document.getElementById('count-badge');
      if (badge) badge.textContent = `${sorted.length}/${ALL_EMAILS.length}`;

      if (!sorted.length) {
        if (empty) empty.classList.remove('hidden');
        if (grid) grid.innerHTML = '';
        return;
      }
      if (empty) empty.classList.add('hidden');
      if (grid) grid.innerHTML = sorted.map(renderRow).join('');
    }

    function setupControls() {
      const ids = ['filter-search', 'filter-conflict', 'filter-profit', 'sort-by'];
      for (const id of ids) {
        const el = document.getElementById(id);
        if (!el) continue;
        const handler = () => {
          if (id === 'filter-search') {
            if (_filterTimer) clearTimeout(_filterTimer);
            _filterTimer = setTimeout(applyAndRender, 120);
          } else {
            applyAndRender();
          }
        };
        el.addEventListener(id === 'filter-search' ? 'input' : 'change', handler);
      }
    }

    function openModal()  { document.getElementById('modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    async function loadEmails() {
      document.getElementById('loading-state').classList.remove('hidden');
      try {
        const emails = await fetch('/api/emails').then(r => r.json());
        document.getElementById('loading-state').classList.add('hidden');
        const empty = document.getElementById('empty-state');
        if (!emails.length) { empty.classList.remove('hidden'); return; }
        ALL_EMAILS = emails;
        applyAndRender();
      } catch(e) {
        document.getElementById('loading-state').classList.add('hidden');
        alert('Napaka pri nalaganju: ' + e.message);
      }
    }

    function updateDropLabel(input) {
      const files = Array.from(input.files);
      document.getElementById('drop-label').textContent = files.length
        ? files.map(f => f.name).join(', ')
        : 'Klikni ali povleci datoteke sem';
    }

    async function submitEmail(e) {
      e.preventDefault();
      const btn   = document.getElementById('submit-btn');
      const label = document.getElementById('submit-label');
      const spin  = document.getElementById('submit-spinner');
      btn.disabled = true;
      const files = document.getElementById('f-attachments').files;
      label.textContent = files.length ? 'Analiziram… (~30s)' : 'Analiziram… (~20s)';
      spin.classList.remove('hidden');
      try {
        const fd = new FormData();
        fd.append('sender_name',  document.getElementById('f-name').value);
        fd.append('sender_email', document.getElementById('f-email').value);
        fd.append('subject',      document.getElementById('f-subject').value);
        fd.append('body',         document.getElementById('f-body').value);
        for (const file of files) fd.append('attachments', file);

        const res = await fetch('/api/emails', { method: 'POST', body: fd });
        if (!res.ok) throw new Error(await res.text());
        const record = await res.json();
        window.location.href = `/detail?id=${record.id}`;
      } catch(err) {
        alert('Napaka: ' + err.message);
        btn.disabled = false;
        label.textContent = 'Analiziraj z AI';
        spin.classList.add('hidden');
      }
    }

    async function deleteAll() {
      if (!confirm('Zbrisati vse analizirane maile?')) return;
      await fetch('/api/emails', { method: 'DELETE' });
      location.reload();
    }

    setupControls();
    loadEmails();
  </script>
</body>
</html>
